description = "install and configure Rugix Admin"
dependencies = ["rugix-ctrl"]

[parameters]
# Use MUSL builds by default.
use_musl = { default = true }
# Where to get binaries: "container" uses pre-built container binaries,
# a major version (e.g., "v1") resolves the latest matching GitHub release,
# an exact tag (e.g., "v1.0.0-rc.1") downloads that specific release.
source = { default = "v1" }
